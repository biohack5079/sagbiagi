<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ローカル情報を掘り起こすAIショベル「プローワー」。</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        h1 {
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <h1><span id="titleText">ローカル情報を掘り起こすAIショベル「プローワー」。</span> <a href="manual.html" id="manualLink" style="font-size: 0.4em; margin-left: 15px; text-decoration: none; background: #eee; padding: 5px 10px; border-radius: 4px; color: #333; vertical-align: middle;">[使い方説明書]</a></h1>
    <div class="rag-controls-header">
        <label for="fileInput">RAGソース (フォルダ/ファイル):</label>
        <input type="file" id="fileInput" multiple>
        <button id="syncFolderButton">ローカルフォルダ同期 (File System API)</button>
        <button id="resetDocsButton">RAGソースをリセット (LocalStore全削除)</button>
    </div>

    <div class="rag-source-container">
        <div id="fileList">
            <h3>RAGソースファイル一覧 (永続化/アップロード)</h3>
            <ul id="fileListUl">
            </ul>
        </div>
        
        <div id="fileContent">【ここに読み込まれた文書のプレビューまたは選択内容が表示されます】</div>
    </div>
    <hr>

    <label for="pasteArea">一時的なRAGコンテキストとしてテキストまたは画像を貼り付け:</label>
    <textarea id="pasteArea" placeholder="ここにテキストを貼り付けてください。画像を貼り付けると、解析用画像として認識されます。"></textarea>

    <button id="saveOcrButton">貼付テキスト/画像メモを永続ファイルとして保存</button>
    <hr>

    <label for="userInput">質問を入力:</label>
    <textarea id="userInput" placeholder="質問を入力してください..."></textarea>
    
    <div style="margin-bottom: 10px; padding: 10px; background-color: #f0f0f0; border-radius: 5px;">
        <label for="geminiApiKey">Gemini API Key:</label>
        <input type="password" id="geminiApiKey" placeholder="AIzaSy..." style="width: 300px;">
        <button id="saveKeyButton">保存</button>
    </div>

    <div style="margin-bottom: 10px; padding: 10px; background-color: #f0f0f0; border-radius: 5px;">
        <label for="hfUrlInput">HF / Ollama URL:</label>
        <input type="password" id="hfUrlInput" placeholder="http://localhost:11434 or https://user-space.hf.space" style="width: 300px;">
        <button id="saveHfUrlButton">保存</button>
    </div>

    <div style="margin-bottom: 10px; padding: 10px; background-color: #f0f0f0; border-radius: 5px;">
        <label for="hfToken">HF Access Token:</label>
        <input type="password" id="hfToken" placeholder="hf_..." style="width: 300px;">
        <button id="saveHfTokenButton">保存</button>
    </div>

    <label for="modelSelect">モデル選択:</label>
    <select id="modelSelect">
        <option value="gemma:7b">Gemma 7B (ローカル)</option>
        <option value="gpt-oss:20b">GPT-OSS 20B (ローカル)</option>
        <option value="gemma3:12b">Gemma 12B (ローカル)</option>
        <option value="gpt-oss:120b">GPT-OSS 120B (ローカル)</option>
        <option value="sarasina">Sarasina (SoftBank/local)</option>
        <option value="gemma3:4b-it-q4_K_M" selected>Gemma 3 4B (HF Space / Ollama)</option>
        <option value="gemini-flash">Gemini API (クラウド)</option>
    </select>
    
    <button id="sendButton">送信</button>
    
    <div id="chatLog"></div>

    <script>
        if (!navigator.language.startsWith('ja')) {
            const t = {
                title: 'AI Shovel "Plower" digging up local information.',
                ragSource: 'RAG Source (Folder/File):',
                sync: 'Sync Local Folder (File System API)',
                reset: 'Reset RAG Source (Clear LocalStore)',
                listHeader: 'RAG Source Files (Persisted/Uploaded)',
                preview: '[Preview of loaded document or selection will appear here]',
                pasteLabel: 'Paste text or image as temporary RAG context:',
                pastePlaceholder: 'Paste text here. Ctrl+V to paste image for multimodal analysis.',
                saveOcr: 'Save Pasted Text/Image Memo as Persistent File',
                inputLabel: 'Enter Question:',
                inputPlaceholder: 'Please enter your question...',
                keyLabel: 'Gemini API Key:',
                saveKey: 'Save',
                modelLabel: 'Select Model:',
                send: 'Send',
                cloud: '(Cloud)',
                local: '(local)',
                hfUrlLabel: 'HF / Ollama URL:',
                saveHfUrl: 'Save URL',
                hfTokenLabel: 'HF Access Token:',
                saveHfToken: 'Save Token',
                manual: '[Usage Guide]'
            };

            document.title = t.title;
            document.getElementById('titleText').textContent = t.title;
            document.querySelector('label[for="fileInput"]').textContent = t.ragSource;
            document.getElementById('syncFolderButton').textContent = t.sync;
            document.getElementById('resetDocsButton').textContent = t.reset;
            document.querySelector('#fileList h3').textContent = t.listHeader;
            document.getElementById('fileContent').textContent = t.preview;
            document.querySelector('label[for="pasteArea"]').textContent = t.pasteLabel;
            document.getElementById('pasteArea').placeholder = t.pastePlaceholder;
            document.getElementById('saveOcrButton').textContent = t.saveOcr;
            document.querySelector('label[for="userInput"]').textContent = t.inputLabel;
            document.getElementById('userInput').placeholder = t.inputPlaceholder;
            document.querySelector('label[for="geminiApiKey"]').textContent = t.keyLabel;
            document.getElementById('saveKeyButton').textContent = t.saveKey;
            document.querySelector('label[for="modelSelect"]').textContent = t.modelLabel;
            document.querySelector('label[for="hfUrlInput"]').textContent = t.hfUrlLabel;
            document.getElementById('saveHfUrlButton').textContent = t.saveHfUrl;
            document.querySelector('label[for="hfToken"]').textContent = t.hfTokenLabel;
            document.getElementById('saveHfTokenButton').textContent = t.saveHfToken;
            document.getElementById('manualLink').textContent = t.manual;
            document.getElementById('sendButton').textContent = t.send;
            
            const select = document.getElementById('modelSelect');
            for(let opt of select.options) {
                if(opt.text.includes('(クラウド)')) {
                    opt.text = opt.text.replace('(クラウド)', t.cloud);
                }
                if(opt.text.includes('(ローカル)')) {
                    opt.text = opt.text.replace('(ローカル)', t.local);
                }
            }
            document.documentElement.lang = 'en';
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
